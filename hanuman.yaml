apiVersion: apps/v1
kind: Deployment
metadata:
  name: springappdeploy
  namespace: hanuman
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: springapp
  template:
    metadata:
      labels:
        app: springapp
    spec:
      containers:
      - name: springcon
        image: maanesha689/activate:1.0.0
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_DB_HOSTNAME
          valueFrom:
            configMapKeyRef:
              name: springcm
              key: db_hostname
        - name: MONGO_DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: springcm
              key: db_username
        - name: MONGO_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: springsc
              key: db_password
        resources:
          requests:
            cpu: "600m"
            memory: "250Mi"
          limits:
            cpu: "800m"
            memory: "500Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: springsvc
  namespace: hanuman
spec:
  selector:
    app: springapp
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodeploy
  namespace: hanuman
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongocon
        image: mongo:latest
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            configMapKeyRef:
              name: springcm
              key: db_username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: springsc
              key: db_password
        volumeMounts:
        - name: mongovolume
          mountPath: /data/db
      volumes:
      - name: mongovolume
        emptyDir: {}   # Replace with PersistentVolumeClaim in real use
---
apiVersion: v1
kind: Service
metadata:
  name: mongosvc
  namespace: hanuman
spec:
  selector:
    app: mongo
  type: ClusterIP
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: springcm
  namespace: hanuman
data:
  db_username: admin
  db_hostname: mongosvc
---
apiVersion: v1
kind: Secret
metadata:
  name: springsc
  namespace: hanuman
type: Opaque
stringData:
  db_password: password
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: springhpa
  namespace: hanuman
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: springappdeploy
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
