apiVersion: v1
kind: Namespace
metadata:
  name: demoapp
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: springappconfigmap
  namespace: demoapp
data:
  username: springapp
---
apiVersion: v1
kind: Secret
metadata:
  name: springappsecrets
  namespace: demoapp
type: Opaque
stringData:
  password: mongodb@123
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-hostpath
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/tmp/mongodata"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-hostpath
  namespace: demoapp
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
## Spring Boot App Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springappdeployment
  namespace: demoapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springapp
  template:
    metadata:
      labels:
        app: springapp
    spec:
      containers:
        - name: springappcontainer
          image: manesha689/activate:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATA_MONGODB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: springappconfigmap
                  key: username
            - name: SPRING_DATA_MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: springappsecrets
                  key: password
            - name: SPRING_DATA_MONGODB_HOST
              value: mongo
            - name: SPRING_DATA_MONGODB_PORT
              value: "27017"
            - name: SPRING_DATA_MONGODB_DATABASE
              value: mydb
            - name: SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE
              value: admin
---
apiVersion: v1
kind: Service
metadata:
  name: springapp
  namespace: demoapp
spec:
  selector:
    app: springapp
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
# MongoDB Deployment with PVC
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: demoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      volumes:
        - name: mongodb-pvc
          persistentVolumeClaim:
            claimName: pvc-hostpath
      containers:
        - name: mongodbcontainer
          image: mongo
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: springappconfigmap
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: springappsecrets
                  key: password
          volumeMounts:
            - name: mongodb-pvc
              mountPath: /data/db
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: demoapp
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

